<!DOCTYPE html>
<html>
<head>
    <title>AI Credit Card Fraud Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
        }

        .progress {
            height: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4">

                <h3 class="text-center mb-3">
                    AI-Powered Credit Card Fraud Detection
                </h3>

                <p class="text-center text-muted">
                    Upload transaction dataset to analyze fraud patterns
                </p>

                <form id="uploadForm" action="/predict" method="post" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Upload CSV File</label>
                        <input class="form-control" type="file" name="file" accept=".csv" required>
                    </div>

                    <div class="d-grid">
                        <button id="analyzeBtn" class="btn btn-primary btn-lg" type="submit">
                            Analyze Transactions
                        </button>
                    </div>

                    <!-- Progress Bar -->
                    <div class="progress mt-4 d-none" id="progressContainer">
                        <div class="progress-bar progress-bar-striped progress-bar-animated"
                             role="progressbar"
                             style="width: 100%">
                            Analyzing transactions...
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<!-- Script to Show Progress Bar -->
<script>
document.getElementById("uploadForm").addEventListener("submit", function() {
    document.getElementById("analyzeBtn").disabled = true;
    document.getElementById("progressContainer").classList.remove("d-none");
});
</script>

</body>
</html>
